<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка профиля</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <!-- Верхняя обложка -->
    <div class="card-cover"></div>
    <!-- Аватар -->
    <div class="card-avatar">
      <img src="плактон.webp" alt="Аватар">
    </div>
    <!-- Основная информация -->
    <div class="card-info">
      <h2 class="card-name">Кирилл Красноруцкий</h2>
      <p class="card-role">Frontend-разработчик</p>
      <p class="card-bio">
        Люблю красивый код и чистый дизайн.
        Верстаю сайты и мечтаю о своём стартапе.
      </p>
    </div>
    <!-- Статистика -->
    <div class="card-stats">
      <div class="stat">
        <span class="stat-number">142</span>
        <span class="stat-label">проекта</span>
      </div>
      <div class="stat">
        <span class="stat-number">5.9M</span>
        <span class="stat-label">подписчиков</span>
      </div>
      <div class="stat">
        <span class="stat-number">1K</span>
        <span class="stat-label">отзывов</span>
      </div>
    </div>
    <!-- Кнопки -->
    <div class="card-actions">
      <button class="btn btn-primary">Подписаться</button>
      <button class="btn btn-secondary">Написать</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
